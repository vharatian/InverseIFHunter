# AUTO-GENERATED from config_routing.py — do not edit manually.
# Regenerate:  python scripts/generate_nginx.py
# Source of truth: config_routing.py

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    client_max_body_size 64m;

    # ── Trailing-slash redirects ──────────────────────────────────────
    location = /staging {
        return 302 /staging/;
    }
    location = /staging/grafana {
        return 302 /staging/grafana/;
    }
    location = /grafana {
        return 302 /grafana/;
    }

    # ── Staging Grafana: strip /staging → /grafana/... ──────────────────────
    location /staging/grafana/ {
        rewrite ^/staging(/grafana/.*)$ $1 break;
        set $staging_grafana staging-grafana-gateway;
        proxy_pass http://$staging_grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Prefix /staging/grafana;
    }

    # ── Staging app: strip /staging/ ────────────────────────────────────
    location /staging/ {
        rewrite ^/staging/(.*)$ /$1 break;
        set $staging_elixir staging-edge-gateway;
        proxy_pass http://$staging_elixir:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Prefix /staging;
        proxy_read_timeout 1200;
        proxy_send_timeout 1200;
        proxy_buffering off;
    }

    # ── Production Grafana ───────────────────────────────────────────
    location /grafana/ {
        proxy_pass http://grafana:3000/grafana/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Production app (catch-all → Elixir edge) ────────────────────
    location / {
        proxy_pass http://elixir-edge:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 1200;
        proxy_send_timeout 1200;
        proxy_buffering off;
    }
}
