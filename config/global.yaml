secrets:
  openai_api_key: ${OPENAI_API_KEY}
  openrouter_api_key: ${OPENROUTER_API_KEY}
  fireworks_api_key: ${FIREWORKS_API_KEY}
  redis_url: ${REDIS_URL:-redis://localhost:6379/0}
  google_service_account_path: ${GOOGLE_SERVICE_ACCOUNT_JSON_PATH}
alignment:
  target_rate: 0.85
  enabled: true
app:
  max_hunts_per_notebook: 16
  min_explanation_words: 10
  version_check_interval: 30000
  admin_mode_enabled: true
  admin_mode_password: ${ADMIN_MODE_PASSWORD:-}
  admin_bypass:
    min_criteria_count: true
    prompt_length_range: true
    reference_validation: true
    hunt_limit: true
    hunt_limit_warning: true
    selection_count: true
    selection_mode_rules: true
    post_confirmation_lock: true
    diversity_check: true
    min_explanation_words: true
    all_grades_before_reveal: true
    reviews_readonly_after_reveal: true
    reveal_one_way: true
    reviewer_approval: true
    llm_revealed_before_save: true
    reviews_complete_before_save: true
    selection_required_before_save: true
    review_count_matches: true
    section_locks: true
    autosave_lock: true
    model_mismatch_warning: true
    alignment_check: true
hunt:
  parallel_workers_min: 1
  parallel_workers_max: 16
  parallel_workers_default: 4
  target_breaks_default: 4
  model_slots_count: 4
  judge_slots_count: 4
  provider_models:
    openrouter:
    - id: openai/gpt-5.2
      name: GPT-5.2
    - id: openai/gpt-5.4
      name: GPT-5.4
    - id: openai/gpt-5.2-pro
      name: GPT 5.2 Pro
    - id: openai/gpt-5.4-pro
      name: GPT 5.4 Pro
    - id: anthropic/claude-sonnet-4.5
      name: Sonnet 4.5
    - id: anthropic/claude-opus-4.5
      name: Opus 4.5
    - id: anthropic/claude-opus-4.6
      name: Opus 4.6
    - id: nvidia/nemotron-3-nano-30b-a3b
      name: Nemotron-3-Nano (Fast)
    - id: qwen/qwen3-235b-a22b-thinking-2507
      name: Qwen3-235B (Thinking)
    - id: google/gemini-3.1-pro-preview
      name: Gemini 3.1 Pro (Preview)
    - id: anthropic/claude-sonnet-4.6
      name: Sonnet 4.6
  selection_slots: 4
  min_breaking_required: 0
  max_breaking_required: 4
  modes:
  - id: break_50
    name: '>50% Criteria Breaking'
    break_threshold: 0.5
    type: breaking
  - id: break_75
    name: '>75% Criteria Breaking'
    break_threshold: 0.75
    type: breaking
  - id: break_all
    name: All Criteria Breaking
    break_threshold: 1
    type: breaking
  - id: all_passing
    name: All Passing
    break_threshold: undefined
    type: passing
  judge_models:
    openrouter:
    - id: openai/gpt-5.2
      name: GPT-5.2
    - id: openai/gpt-5.4
      name: GPT-5.4
    - id: openai/gpt-5.2-pro
      name: GPT 5.2 Pro
    - id: openai/gpt-5.4-pro
      name: GPT 5.4 Pro
    - id: anthropic/claude-opus-4.6
      name: Opus 4.6
http:
  max_connections: 50
  max_keepalive_connections: 30
  keepalive_expiry: 60.0
  timeouts:
    openrouter:
      read: 180
      connect: 5
    fireworks:
      read: 120
      connect: 5
    openai:
      read: 60
      connect: 5
session:
  ttl_seconds: 86400
  stream_ttl_seconds: 14400
  heartbeat_ttl_seconds: 30
rate_limits:
  openrouter: 50
  fireworks: 25
  openai: 50
  default: 30
features:
  agentic_qc_enabled: true
  preflight_enabled: true
  rate_limiter_enabled: true
  bypass_hunt_criteria: false
agentic:
  council:
    models:
    - id: openai/gpt-5.2
      enabled: true
    - id: anthropic/claude-sonnet-4.6
      enabled: true
    - id: google/gemini-3.1-pro-preview
      enabled: true
    - id: x-ai/grok-4
      enabled: true
    consensus: chairman
    chairman_model: anthropic/claude-opus-4.6
  rules:
  - id: model_consistency
    enabled: true
    type: deterministic
    checkpoints:
    - preflight
    - final
    description: All 4 selected responses from the same model
    params: {}
  - id: human_llm_grade_alignment
    enabled: true
    type: llm
    use_council: true
    checkpoints:
    - final
    description: Human grading vs LLM judge — flag large disagreements
    params: {}
  - id: metadata_prompt_alignment
    enabled: true
    type: llm
    use_council: true
    checkpoints:
    - final
    description: Prompt content matches claimed Domain/Use Case (context-aware)
    params: {}
  - id: metadata_taxonomy_alignment
    enabled: true
    type: llm
    use_council: true
    checkpoints:
    - final
    description: L1 Taxonomy consistent with Domain/Use Case (context-aware)
    params: {}
  - id: human_explanation_justifies_grade
    enabled: true
    type: llm
    use_council: true
    checkpoints:
    - final
    description: Human explanation is substantive, not generic
    params: {}
  - id: safety_context_aware
    enabled: true
    type: llm
    use_council: true
    checkpoints:
    - final
    weight: 30
    description: ZERO-TOLERANCE SAFETY — Prompt must contain NO references (explicit
      or implicit) to prohibited content. Any appearance in fiction, examples, hypotheticals,
      metaphors, or academic framing = FAIL.
    params:
      zero_tolerance: true
      prohibited_text: 'ZERO-TOLERANCE: The prompt must contain NO references whatsoever
        — explicit or implicit — to any of the following. If any appear, even in fiction,
        examples, hypotheticals, metaphors, or academic framing, the prompt FAILS.


        PROHIBITED CONTENT (ABSOLUTE):

        1) Sexual Content — sex, eroticism, pornography; rape, sexual violence; sexual
        content involving minors; incest, exploitation.

        2) Violence — killing, murder, assault; war, torture, physical harm; weapons
        used against people.

        3) Self-Harm — suicide; cutting, overdose; any self-injury.

        4) Crime — scams, fraud; hacking; theft; illegal activity.

        5) Terrorism & Extremism — extremist groups; attacks; propaganda.

        6) Abuse & Exploitation — child abuse; trafficking; coercion.

        7) Weapons & Drugs — guns, bombs, explosives; illegal drugs; manufacturing
        or use.

        8) Privacy & Surveillance Abuse — doxxing; stalking; tracking or exposing
        individuals.

        '
  - id: qc_cfa_criteria_valid
    enabled: true
    type: llm
    use_council: true
    checkpoints:
    - final
    description: 'For QC/CFA: criteria can reference what''s not in prompt; no invented
      golden answers'
    params:
      taxonomies:
      - QC
      - CFA
  - id: prompt_taxonomy_domain_alignment
    enabled: true
    type: llm
    use_council: true
    checkpoints:
    - final
    weight: 11
    description: Prompt is aligned to L1 Taxonomy first, then Domain
    params: {}
  - id: user_prompt_length
    enabled: true
    type: deterministic
    checkpoints:
    - final
    weight: 11
    description: User prompt word count within ±10 words of declared metadata length
    params:
      tolerance: 10
  - id: no_imaginary_constraints
    enabled: true
    type: llm
    use_council: true
    checkpoints:
    - final
    weight: 15
    description: Prompt contains no imaginary or invented constraints
    params: {}
  - id: overall_criteria_quality
    enabled: true
    type: llm
    use_council: true
    checkpoints:
    - final
    weight: 11
    description: Criteria are specific, measurable, and help the model learn
    params: {}
  - id: human_llm_judgment_disagreement
    enabled: true
    type: deterministic
    checkpoints:
    - final
    weight: 11
    description: Human/LLM grade disagreement rate below configurable threshold
    params:
      disagreement_threshold: 0.3
  - id: human_explanation_quality
    enabled: true
    type: llm
    use_council: true
    checkpoints:
    - final
    weight: 11
    description: Human explanations are meaningful and related to the response
    params: {}
queue:
  production_start: '2026-02-22T00:00:00Z'
task_identity:
  display_id_field: Task ID
  display_id_label: Task ID
  fallback_fields:
  - TaskID
  - task_id
review:
  max_rounds: 5
notifications:
  enabled: true
  max_per_user: 100
  poll_interval_ms: 15000
auto_save:
  enabled: true
  debounce_ms: 800
  min_interval_ms: 2000
resilience:
  retry_attempts: 3
  retry_base_delay: 1.0
  retry_max_delay: 30.0
  retry_backoff_factor: 2.0
bulk_actions:
  enabled: true
  max_batch_size: 2
presence:
  enabled: true
  heartbeat_interval_ms: 10000
  ttl_seconds: 30
idempotency:
  ttl_hours: 24
reviewer:
  allowed_emails:
  - tyler@turing.com
  - maruthi@turing.com
  agent:
    model: anthropic/claude-opus-4.6
    max_tokens: 2048
    timeout: 120
