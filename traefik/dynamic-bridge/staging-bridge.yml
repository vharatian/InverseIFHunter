# Loaded only on production Traefik (see TRAEFIK_DYNAMIC_DIR in .env.production).
# Forwards /staging to the staging stack Traefik (alias staging-traefik-gateway on modelhunter_edge).
http:
  routers:
    staging-from-public-ip:
      rule: "PathPrefix(`/staging`)"
      entryPoints:
        - web
      service: staging-traefik-upstream
      priority: 100
  services:
    staging-traefik-upstream:
      loadBalancer:
        servers:
          - url: "http://staging-traefik-gateway:80"
