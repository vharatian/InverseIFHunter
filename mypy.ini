# Mypy — advisory type checking for InverseIFHunter.
#
# Philosophy:
#   * Non-blocking by default (run via ``mypy --config-file mypy.ini .`` or the
#     helper script in scripts/lint_types.sh once added). Developers should fix
#     errors in code they touch, but a dirty baseline is tolerated so we can
#     tighten incrementally.
#   * Strict on new / recently touched modules; loose on the long tail.
#
# Usage:
#     pip install mypy
#     mypy --config-file mypy.ini services/ routes/
#
# Update the ``strict``-listed packages as modules are cleaned up. Everything
# under ``[mypy]`` applies to the rest of the tree and is intentionally lax.

[mypy]
python_version = 3.11
ignore_missing_imports = True
follow_imports = silent
warn_unused_ignores = True
show_error_codes = True
pretty = True
# Start loose for the legacy code; tighten per-module below.
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False

# ── Modules that should be type-clean (Phase 4 scope) ──────────────────────
# Each entry here is code we're actively modernising; errors here should be
# fixed at source, not suppressed.

[mypy-services.session_store]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
warn_return_any = True

[mypy-middleware.trace_id]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True

# ── External libraries we intentionally skip ──────────────────────────────
# Kept explicit so nobody wonders why mypy "misses" them.

[mypy-redis.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-prometheus_fastapi_instrumentator.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True
