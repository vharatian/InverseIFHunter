version: "3.9"

services:
  elixir-edge:
    build: ./elixir-edge
    ports:
      - "127.0.0.1:${ELIXIR_PORT:-4000}:4000"
    environment:
      PYTHON_CORE_URL: http://python-core:8000
      PYTHON_DASHBOARD_URL: http://python-dashboard:8001
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY_BASE: ${ELIXIR_SECRET_KEY_BASE}
      PHX_HOST: ${DOMAIN}
      PHX_URL_SCHEME: ${PHX_URL_SCHEME:-http}
      PHX_PUBLIC_PORT: ${PUBLIC_HTTP_PORT:-80}
      PORT: "4000"
    depends_on:
      redis:
        condition: service_healthy
      python-core:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - mh-network

  python-core:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "127.0.0.1:${PYTHON_PORT:-8000}:8000"
    env_file: ${ENV_FILE:-.env}
    environment:
      PORT: "8000"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: postgresql+asyncpg://${PG_USER:-mh}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE:-model_hunter}
      TELEMETRY_LOG_PATH: /app/.telemetry/events.jsonl
    volumes:
      - ./config:/app/config
      - ./service_account.json:/app/service_account.json:ro
      - telemetry-data:/app/.telemetry
      - storage-data:/app/.storage
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - mh-network

  python-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8001}:8001"
    environment:
      DASHBOARD_PORT: "8001"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: postgresql+asyncpg://${PG_USER:-mh}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE:-model_hunter}
      TELEMETRY_LOG_PATH: /app/.telemetry/events.jsonl
      SESSION_STORAGE_PATH: /app/.storage
    volumes:
      - ./config:/config
      - ./agentic_reviewer:/agentic_reviewer:ro
      - telemetry-data:/app/.telemetry:ro
      - storage-data:/app/.storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - mh-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DATABASE:-model_hunter}
      POSTGRES_USER: ${PG_USER:-mh}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # WAL archive: named volume so postgres (uid 70) can always write (bind mounts are often root-owned).
      - pg_wal_archive:/backups/wal
      - ./backups/daily:/backups/daily
      - ./docker/postgres-entrypoint.sh:/postgres-entrypoint.sh:ro
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    entrypoint:
      - /bin/sh
      - /postgres-entrypoint.sh
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=cp %p /backups/wal/%f
      - -c
      - max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-mh} -d ${PG_DATABASE:-model_hunter}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - mh-network

  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 300 1
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - mh-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - mh-network

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafdata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - mh-network

volumes:
  pgdata:
  pg_wal_archive:
  redisdata:
  promdata:
  grafdata:
  telemetry-data:
  storage-data:

networks:
  mh-network:
    driver: bridge
  # Shared by mh-production edge proxy + mh-staging (aliases for /staging). Compose creates on first up.
  mh-edge:
    name: modelhunter_edge
    driver: bridge
