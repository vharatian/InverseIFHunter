# Path-based staging at http://VM_IP/staging (production nginx proxies to these aliases on modelhunter_edge).
# Enable STAGING_COMPOSE_OVERRIDE=1 in .env.staging (deploy.sh merges this file).
#
services:
  elixir-edge:
    networks:
      mh-network:
      mh-edge:
        aliases:
          - staging-edge-gateway

  grafana:
    networks:
      mh-network:
      mh-edge:
        aliases:
          - staging-grafana-gateway
