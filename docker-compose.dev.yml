# docker-compose.dev.yml — local development stack
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: model_hunter
      POSTGRES_USER: mh
      POSTGRES_PASSWORD: mh_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mh -d model_hunter"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elixir-edge:
    build: ./elixir-edge
    ports:
      - "4000:4000"
    environment:
      PYTHON_CORE_URL: http://host.docker.internal:8000
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: dev-secret-key-base-that-is-at-least-64-bytes-long-for-phoenix-requirement
      PORT: "4000"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
