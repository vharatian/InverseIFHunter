# Staging nginx — port 443 (HTTPS). Proxies to staging-blue/green.
resolver 127.0.0.11 valid=5s;

upstream staging_app {
    server model-hunter-staging-blue:8010;
    server model-hunter-staging-green:8012;
}

upstream staging_dashboard {
    server model-hunter-staging-dashboard:8011;
}

server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://staging_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_buffering off;
    }

    location /dashboard/ {
        proxy_pass http://staging_dashboard/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }

    location /dashboard/api/ {
        proxy_pass http://staging_dashboard/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dashboard/static/ {
        proxy_pass http://staging_dashboard/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
