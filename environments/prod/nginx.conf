resolver 127.0.0.11 valid=5s;

upstream app {
    server model-hunter-blue:8000 max_fails=1 fail_timeout=30s;
    server model-hunter-green:8002 max_fails=1 fail_timeout=30s;
}

server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_buffering off;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    location /dashboard/ {
        proxy_pass http://dashboard:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60;
    }

    location /dashboard/api/ {
        proxy_pass http://dashboard:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /dashboard/static/ {
        proxy_pass http://dashboard:8001/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://dashboard:8001/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60;
    }

    location /admin/api/ {
        proxy_pass http://dashboard:8001/api/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- InverseIFHunter staging (direct to staging host ports; no edge container needed) ---
    # When production IH is also deployed (edge on :9080), switch these to proxy via :9080 instead.

    location = /staging {
        return 302 $scheme://$host/staging/;
    }

    location = /staging/grafana {
        return 302 $scheme://$host/staging/grafana/;
    }

    # Staging Grafana — direct to host port 3001 (GF_SERVER_SERVE_FROM_SUB_PATH handles /staging/grafana/)
    location /staging/grafana/ {
        proxy_pass http://host.docker.internal:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Staging Elixir — direct to host port 4010, strip /staging/ prefix
    location /staging/ {
        rewrite ^/staging/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:4010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /staging;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_buffering off;
    }
}
