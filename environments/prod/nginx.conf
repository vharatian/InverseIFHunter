resolver 127.0.0.11 valid=5s;

upstream app {
    server model-hunter-blue:8000 max_fails=1 fail_timeout=30s;
    server model-hunter-green:8002 max_fails=1 fail_timeout=30s;
}

server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_buffering off;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    location /dashboard/ {
        proxy_pass http://dashboard:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60;
    }

    location /dashboard/api/ {
        proxy_pass http://dashboard:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /dashboard/static/ {
        proxy_pass http://dashboard:8001/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
