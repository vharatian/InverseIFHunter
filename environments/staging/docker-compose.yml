version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: model-hunter-staging-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-ttl
    volumes:
      - redis-data-staging:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - model-hunter-staging-network

  model-hunter-blue:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    image: model-hunter-staging_model-hunter-blue
    container_name: model-hunter-staging-blue
    restart: unless-stopped
    env_file: ../../.env
    ports:
      - "127.0.0.1:8010:8010"
    environment:
      - PORT=8010
      - GOOGLE_SERVICE_ACCOUNT_JSON_PATH=/workspace/service_account.json
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - OPENROUTER_CONCURRENCY=50
      - FIREWORKS_CONCURRENCY=4
      - OPENAI_CONCURRENCY=30
    volumes:
      - ../../:/workspace:ro
      - ../../.storage-staging:/app/.storage
      - telemetry-data-staging:/app/.telemetry
      - ../../static:/app/static:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - model-hunter-staging-network

  model-hunter-green:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    image: model-hunter-staging_model-hunter-green
    container_name: model-hunter-staging-green
    restart: unless-stopped
    env_file: ../../.env
    ports:
      - "127.0.0.1:8012:8012"
    environment:
      - PORT=8012
      - GOOGLE_SERVICE_ACCOUNT_JSON_PATH=/workspace/service_account.json
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - OPENROUTER_CONCURRENCY=50
      - FIREWORKS_CONCURRENCY=4
      - OPENAI_CONCURRENCY=30
    volumes:
      - ../../:/workspace:ro
      - ../../.storage-staging:/app/.storage
      - telemetry-data-staging:/app/.telemetry
      - ../../static:/app/static:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8012/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - model-hunter-staging-network

  dashboard:
    build:
      context: ../../dashboard
      dockerfile: Dockerfile
    container_name: model-hunter-staging-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8011:8011"
    environment:
      - DASHBOARD_PORT=8011
      - TELEMETRY_LOG_PATH=/app/.telemetry/events.jsonl
      - SESSION_STORAGE_PATH=/app/.storage
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ML_MODEL_PATH=/app/ml_models
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - telemetry-data-staging:/app/.telemetry:ro
      - ../../.storage-staging:/app/.storage:ro
      - ../../ml_pipeline/models:/app/ml_models:ro
    depends_on:
      - model-hunter-blue
    networks:
      - model-hunter-staging-network

  nginx:
    image: nginx:alpine
    container_name: model-hunter-staging-nginx
    restart: unless-stopped
    ports:
      - "443:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - model-hunter-blue
      - model-hunter-green
      - dashboard
    networks:
      - model-hunter-staging-network

volumes:
  telemetry-data-staging:
  redis-data-staging:

networks:
  model-hunter-staging-network:
    driver: bridge
