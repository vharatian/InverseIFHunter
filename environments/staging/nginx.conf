resolver 127.0.0.11 valid=5s;

upstream staging_app {
    server model-hunter-staging-blue:8010 max_fails=1 fail_timeout=30s;
    server model-hunter-staging-green:8012 max_fails=1 fail_timeout=30s;
}

server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://staging_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_buffering off;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    location /dashboard/ {
        proxy_pass http://model-hunter-staging-dashboard:8011/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }

    location /dashboard/api/ {
        proxy_pass http://model-hunter-staging-dashboard:8011/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dashboard/static/ {
        proxy_pass http://model-hunter-staging-dashboard:8011/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://model-hunter-staging-dashboard:8011/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60;
    }

    location /admin/api/ {
        proxy_pass http://model-hunter-staging-dashboard:8011/api/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /reviewer/ {
        proxy_pass http://model-hunter-staging-reviewer:8013/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /reviewer;
        proxy_read_timeout 300;
    }

    location /reviewer/api/ {
        proxy_pass http://model-hunter-staging-reviewer:8013/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Prefix /reviewer;
    }

    location /reviewer/static/ {
        proxy_pass http://model-hunter-staging-reviewer:8013/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
